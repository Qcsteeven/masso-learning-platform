name: masso

x-common-env: &common-env
  TZ: UTC

services:
  # ─── PostgreSQL 18 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    environment:
      <<: *common-env
      POSTGRES_DB: masso
      POSTGRES_USER: masso
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-masso_dev}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masso -d masso"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # ─── Neo4j 5.26 LTS ───────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.26-community
    environment:
      <<: *common-env
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j_dev}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-neo4j_dev}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 12
    restart: unless-stopped

  # ─── ChromaDB 1.5 ─────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:1.5.0
    environment:
      <<: *common-env
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # ─── Redis 8 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev}
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # ─── Prometheus + Grafana (--profile monitoring) ──────────────────────────
  prometheus:
    image: prom/prometheus:v3.0.0
    profiles: [monitoring]
    volumes:
      - ../prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    profiles: [monitoring]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_dev}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pg_data:
  neo4j_data:
  chroma_data:
  redis_data:
  prometheus_data:
  grafana_data:
